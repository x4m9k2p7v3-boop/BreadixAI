<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Восстановление пароля - BreadixAI</title>
    <link rel="icon" type="image/png" href="../public/BreadixWebSite.png">
    <link rel="stylesheet" href="../styles/auth.css">
    <link rel="stylesheet" href="../styles/notifications.css">
</head>
<body>
    <div class="auth-container">
        <!-- Logo -->
        <div class="auth-logo">
            <img src="../public/BreadixWebSite.png" alt="BreadixAI" class="logo-image">
            <h1 class="logo-text">BreadixAI</h1>
        </div>

        <!-- Region Notice -->
        <p class="region-notice">
            Восстановление доступа к аккаунту
        </p>

        <!-- Auth Card -->
        <div class="auth-card">
            <!-- Step 1: Enter username -->
            <form id="step1Form" class="auth-form">
                <h3 style="margin-bottom: 20px; color: var(--text-primary);">Шаг 1: Введите логин</h3>

                <div class="input-group">
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input
                            type="text"
                            id="username"
                            placeholder="Логин"
                            required
                            autocomplete="username"
                        >
                    </div>
                </div>

                <button type="submit" class="submit-btn">Продолжить</button>

                <div class="auth-links">
                    <a href="sign_in.html" class="link">← Вернуться к входу</a>
                </div>
            </form>

            <!-- Step 2: Answer security question -->
            <form id="step2Form" class="auth-form" style="display: none;">
                <h3 style="margin-bottom: 20px; color: var(--text-primary);">Шаг 2: Контрольный вопрос</h3>

                <p id="securityQuestion" style="color: var(--text-secondary); margin-bottom: 20px; font-size: 14px;"></p>

                <div class="input-group">
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                            <line x1="12" y1="17" x2="12.01" y2="17"></line>
                        </svg>
                        <input
                            type="text"
                            id="securityAnswer"
                            placeholder="Ваш ответ"
                            required
                        >
                    </div>
                </div>

                <button type="submit" class="submit-btn">Проверить</button>

                <div class="auth-links">
                    <a href="#" class="link" id="backToStep1">← Назад</a>
                </div>
            </form>

            <!-- Step 3: Set new password -->
            <form id="step3Form" class="auth-form" style="display: none;">
                <h3 style="margin-bottom: 20px; color: var(--text-primary);">Шаг 3: Новый пароль</h3>

                <div class="input-group">
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input
                            type="password"
                            id="newPassword"
                            placeholder="Новый пароль"
                            required
                            minlength="8"
                            maxlength="64"
                        >
                        <button type="button" class="toggle-password" id="toggleNewPassword">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                    <small style="color: var(--text-tertiary); font-size: 12px; margin-top: 4px; display: block;">
                        Минимум 8 символов, включая заглавные и строчные буквы, цифры и спецсимволы
                    </small>
                </div>

                <div class="input-group">
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input
                            type="password"
                            id="confirmNewPassword"
                            placeholder="Подтвердите пароль"
                            required
                        >
                        <button type="button" class="toggle-password" id="toggleConfirmNewPassword">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Сбросить пароль</button>
            </form>

            <!-- Contact Link -->
            <div class="contact-link">
                <a href="https://t.me/Breadixx" target="_blank" class="link-secondary">Связаться с нами</a>
            </div>
        </div>
    </div>

    <script src="../src/js/notifications.js"></script>
    <script src="../src/features/features.js"></script>
    <script>
        let currentUsername = '';

        // Step 1: Check username
        document.getElementById('step1Form').addEventListener('submit', (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const question = PasswordRecovery.getSecurityQuestion(username);

            if (!question) {
                NotificationSystem.alert('Пользователь не найден или не настроил контрольный вопрос', 'error');
                return;
            }

            currentUsername = username;
            document.getElementById('securityQuestion').textContent = question;
            document.getElementById('step1Form').style.display = 'none';
            document.getElementById('step2Form').style.display = 'block';
        });

        // Back to step 1
        document.getElementById('backToStep1').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('step2Form').style.display = 'none';
            document.getElementById('step1Form').style.display = 'block';
            document.getElementById('securityAnswer').value = '';
        });

        // Step 2: Verify answer
        document.getElementById('step2Form').addEventListener('submit', (e) => {
            e.preventDefault();

            const answer = document.getElementById('securityAnswer').value.trim();

            if (PasswordRecovery.verifyAnswer(currentUsername, answer)) {
                document.getElementById('step2Form').style.display = 'none';
                document.getElementById('step3Form').style.display = 'block';
            } else {
                NotificationSystem.alert('Неверный ответ на контрольный вопрос', 'error');
            }
        });

        // Toggle password visibility
        const toggleNewPassword = document.getElementById('toggleNewPassword');
        const newPasswordInput = document.getElementById('newPassword');

        toggleNewPassword.addEventListener('click', () => {
            const type = newPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            newPasswordInput.setAttribute('type', type);

            const svg = toggleNewPassword.querySelector('svg');
            if (type === 'text') {
                svg.innerHTML = `
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                `;
            } else {
                svg.innerHTML = `
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                `;
            }
        });

        const toggleConfirmNewPassword = document.getElementById('toggleConfirmNewPassword');
        const confirmNewPasswordInput = document.getElementById('confirmNewPassword');

        toggleConfirmNewPassword.addEventListener('click', () => {
            const type = confirmNewPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            confirmNewPasswordInput.setAttribute('type', type);

            const svg = toggleConfirmNewPassword.querySelector('svg');
            if (type === 'text') {
                svg.innerHTML = `
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                `;
            } else {
                svg.innerHTML = `
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                `;
            }
        });

        // Step 3: Reset password
        document.getElementById('step3Form').addEventListener('submit', (e) => {
            e.preventDefault();

            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmNewPasswordInput.value;

            // Validate password
            const passwordErrors = validatePassword(newPassword);
            if (passwordErrors.length > 0) {
                NotificationSystem.alert(passwordErrors.join('\n'), 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                NotificationSystem.alert('Пароли не совпадают', 'error');
                return;
            }

            // Reset password
            if (PasswordRecovery.resetPassword(currentUsername, newPassword)) {
                NotificationSystem.toast('Пароль успешно изменён!', 'success', 2000);
                setTimeout(() => {
                    window.location.href = 'sign_in.html';
                }, 1000);
            } else {
                NotificationSystem.alert('Ошибка при сбросе пароля', 'error');
            }
        });
    </script>
</body>
</html>
