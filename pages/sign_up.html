<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - BreadixAI</title>
    <link rel="icon" type="image/png" href="../public/BreadixWebSite.png">
    <link rel="stylesheet" href="../styles/auth.css">
    <link rel="stylesheet" href="../styles/notifications.css">
</head>
<body>
    <div class="auth-container">
        <!-- Logo -->
        <div class="auth-logo">
            <img src="../public/BreadixWebSite.png" alt="BreadixAI" class="logo-image">
            <h1 class="logo-text">BreadixAI</h1>
        </div>

        <!-- Region Notice -->
        <p class="region-notice">
            Создайте аккаунт используя логин и пароль
        </p>

        <!-- Auth Card -->
        <div class="auth-card">
            <form id="signUpForm" class="auth-form">
                <!-- Username Input -->
                <div class="input-group">
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input
                            type="text"
                            id="username"
                            placeholder="Логин"
                            required
                            autocomplete="username"
                            minlength="3"
                            maxlength="20"
                            pattern="[a-zA-Z][a-zA-Z0-9_-]*"
                            title="Логин должен начинаться с буквы и содержать только латинские буквы, цифры, дефис и подчёркивание"
                        >
                    </div>
                    <small style="color: var(--text-tertiary); font-size: 12px; margin-top: 4px; display: block;">
                        3-20 символов, только латинские буквы, цифры, дефис и подчёркивание
                    </small>
                </div>

                <!-- Password Input -->
                <div class="input-group">
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input
                            type="password"
                            id="password"
                            placeholder="Пароль"
                            required
                            autocomplete="new-password"
                            minlength="8"
                            maxlength="64"
                        >
                        <button type="button" class="toggle-password" id="togglePassword">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                    <small style="color: var(--text-tertiary); font-size: 12px; margin-top: 4px; display: block;">
                        Минимум 8 символов, включая заглавные и строчные буквы, цифры и спецсимволы
                    </small>
                </div>

                <!-- Confirm Password Input -->
                <div class="input-group">
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input
                            type="password"
                            id="confirmPassword"
                            placeholder="Подтвердите пароль"
                            required
                            autocomplete="new-password"
                        >
                        <button type="button" class="toggle-password" id="toggleConfirmPassword">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Security Question -->
                <div class="input-group">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-primary); font-size: 14px;">Контрольный вопрос (для восстановления пароля)</label>
                    <select id="securityQuestion" required style="width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); margin-bottom: 12px;">
                        <option value="">Выберите вопрос</option>
                        <option value="Как звали вашего первого питомца?">Как звали вашего первого питомца?</option>
                        <option value="В каком городе вы родились?">В каком городе вы родились?</option>
                        <option value="Девичья фамилия вашей матери?">Девичья фамилия вашей матери?</option>
                        <option value="Название вашей первой школы?">Название вашей первой школы?</option>
                        <option value="Ваше любимое блюдо?">Ваше любимое блюдо?</option>
                    </select>
                    <input
                        type="text"
                        id="securityAnswer"
                        placeholder="Ваш ответ"
                        required
                        style="width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary);"
                    >
                </div>

                <!-- Terms Checkbox -->
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="terms" required>
                        <span class="checkbox-text">
                            Я согласен с
                            <a href="terms.html" target="_blank" class="link">Условиями использования</a> и
                            <a href="privacy.html" target="_blank" class="link">Политикой конфиденциальности</a> BreadixAI.
                        </span>
                    </label>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="submit-btn">Зарегистрироваться</button>

                <!-- Links -->
                <div class="auth-links">
                    <span></span>
                    <a href="sign_in.html" class="link">Уже есть аккаунт? Войти</a>
                </div>
            </form>

            <!-- Contact Link -->
            <div class="contact-link">
                <a href="https://t.me/Breadixx" target="_blank" class="link-secondary">Связаться с нами</a>
            </div>
        </div>
    </div>

    <!-- === UI COMPONENTS === -->
    <script src="../src/js/notifications.js"></script>

    <!-- === CORE UTILITIES === -->
    <script src="../src/database/crypto-utils.js"></script>

    <!-- === DATABASE LAYER === -->
    <script src="../src/database/stable-database.js"></script>
    <script src="../src/database/session-manager.js"></script>
    <script src="../src/database/sync-manager.js"></script>

    <!-- === FEATURES === -->
    <script src="../src/features/features.js"></script>

    <!-- === AUTH LOGIC === -->
    <script src="../src/auth/auth.js"></script>
</body>
</html>
