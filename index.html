<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BreadixAI</title>
    <link rel="icon" type="image/png" href="BreadixWebSite.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn sidebar-content" id="newChatBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 20h9"></path>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                    </svg>
                    Новый чат
                </button>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="9" y1="3" x2="9" y2="21"></line>
                    </svg>
                </button>
            </div>

            <div class="chat-history sidebar-content" id="chatHistory">
                <!-- Chat groups will be added here -->
            </div>

            <div class="sidebar-footer sidebar-content">
                <button class="user-menu-btn" id="userMenuBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <span class="user-name" id="userName">Пользователь</span>
                </button>
            </div>
        </aside>

        <!-- User Menu Popup -->
        <div class="user-menu-popup" id="userMenuPopup">
            <button class="user-menu-item" id="openSettingsBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M12 1v6m0 6v6"></path>
                    <path d="M17 12h6M1 12h6"></path>
                </svg>
                Настройки
            </button>
            <button class="user-menu-item" id="helpBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                Справка
            </button>
            <button class="user-menu-item" id="logoutBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Выйти
            </button>
        </div>

        <!-- Main Area -->
        <main class="main">
            <button class="new-chat-floating" id="newChatFloating">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>

            <!-- Chat Container -->
            <div class="chat-container" id="chatContainer">
                <div class="empty-state" id="emptyState">
                    <img src="BreadixWebSite.png" alt="BreadixAI" class="empty-logo">
                    <h1>Привет, я BreadixAI</h1>
                    <div class="suggestion-chips">
                        <button class="suggestion-chip">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="16 18 22 12 16 6"></polyline>
                                <polyline points="8 6 2 12 8 18"></polyline>
                            </svg>
                            Напиши функцию на Python
                        </button>
                        <button class="suggestion-chip">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                            </svg>
                            Объясни концепцию
                        </button>
                        <button class="suggestion-chip">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.35-4.35"></path>
                            </svg>
                            Исследуй тему
                        </button>
                        <button class="suggestion-chip">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 20h9"></path>
                                <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                            </svg>
                            Помоги написать текст
                        </button>
                    </div>
                </div>

                <div class="messages" id="messages" style="display: none;">
                    <!-- Messages will be added here -->
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-container">
                    <div class="input-wrapper">
                        <div class="input-top">
                            <button class="attach-btn" title="Прикрепить файл" id="attachBtn">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                                </svg>
                            </button>
                            <input type="file" id="fileInput" style="display: none;" accept=".txt,.js,.py,.html,.css,.json,.md,.jpg,.jpeg,.png,.gif,.webp" multiple>
                            <textarea
                                id="messageInput"
                                placeholder="Сообщение..."
                                rows="1"
                            ></textarea>
                            <div class="model-selector-inline" id="modelSelectorInline">
                                <button class="model-selector-inline-btn" id="modelSelectorInlineBtn" title="Выбрать модель">
                                    <span class="model-name-inline" id="currentModelNameInline">GPT-4.1 Mini</span>
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="6 9 12 15 18 9"></polyline>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <div class="attached-files" id="attachedFiles"></div>
                        <div class="input-bottom">
                            <div class="input-modes">
                                <button class="mode-pill" id="searchBtn">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="11" cy="11" r="8"></circle>
                                        <path d="m21 21-4.35-4.35"></path>
                                    </svg>
                                    Поиск в интернете
                                </button>
                            </div>
                            <button class="send-btn" id="sendBtn" disabled>
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="22" y1="2" x2="11" y2="13"></line>
                                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="input-footer">
                        <p class="input-hint">BreadixAI может ошибаться. Проверяйте важную информацию.</p>
                        <div class="token-counter" id="tokenCounter">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                            </svg>
                            <span id="tokenCount">0</span> / <span id="tokenLimit">128,000</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Token Limit Modal -->
    <div class="token-limit-modal" id="tokenLimitModal">
        <div class="token-limit-content">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <h3>Достигнут лимит токенов</h3>
            <p>Вы достигли максимального количества токенов для этого чата. Начните новый чат, чтобы продолжить.</p>
            <button class="token-limit-btn" id="newChatFromLimit">Начать новый чат</button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="settings-modal" id="settingsModal">
        <div class="settings-content">
            <div class="settings-sidebar">
                <div class="settings-header">
                    <h2>Настройки</h2>
                    <button class="close-settings" id="closeSettings">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <nav class="settings-nav">
                    <button class="settings-nav-item active" data-tab="general">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M12 1v6m0 6v6"></path>
                            <path d="M17 12h6M1 12h6"></path>
                        </svg>
                        Общие
                    </button>
                    <button class="settings-nav-item" data-tab="appearance">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                        Внешний вид
                    </button>
                    <button class="settings-nav-item" data-tab="account">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        Аккаунт
                    </button>
                </nav>
            </div>
            <div class="settings-main">
                <!-- General Tab -->
                <div class="settings-tab active" id="tab-general">
                    <h3>Общие настройки</h3>
                    <div class="settings-section">
                        <label class="settings-label">
                            <span>Язык интерфейса</span>
                            <select class="settings-select">
                                <option value="ru">Русский</option>
                                <option value="en">English</option>
                            </select>
                        </label>
                    </div>
                </div>

                <!-- Appearance Tab -->
                <div class="settings-tab" id="tab-appearance">
                    <h3>Внешний вид</h3>
                    <div class="settings-section">
                        <label class="settings-label">
                            <span>Тема</span>
                            <select class="settings-select" id="themeSelect">
                                <option value="dark">Тёмная</option>
                                <option value="light">Светлая</option>
                            </select>
                        </label>
                    </div>
                </div>

                <!-- Account Tab -->
                <div class="settings-tab" id="tab-account">
                    <h3>Аккаунт</h3>
                    <div class="settings-section">
                        <div class="account-info">
                            <p><strong>Логин:</strong> <span id="accountUsername">Пользователь</span></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="marked.min.js"></script>
    <script src="config.js"></script>
    <script src="prompts.js"></script>
    <script src="script.js"></script>
</body>
</html>
