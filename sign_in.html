<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - BreadixAI</title>
    <link rel="icon" type="image/png" href="BreadixWebSite.png">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
    </button>

    <div class="auth-container">
        <!-- Logo -->
        <div class="auth-logo">
            <img src="BreadixWebSite.png" alt="BreadixAI" class="logo-image">
            <h1 class="logo-text">BreadixAI</h1>
        </div>

        <!-- Region Notice -->
        <p class="region-notice">
            Войдите используя логин и пароль
        </p>

        <!-- Auth Card -->
        <div class="auth-card">
            <form id="signInForm" class="auth-form">
                <!-- Username Input -->
                <div class="input-group">
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input
                            type="text"
                            id="username"
                            placeholder="Логин"
                            required
                            autocomplete="username"
                        >
                    </div>
                </div>

                <!-- Password Input -->
                <div class="input-group">
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input
                            type="password"
                            id="password"
                            placeholder="Пароль"
                            required
                            autocomplete="current-password"
                        >
                        <button type="button" class="toggle-password" id="togglePassword">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Terms Checkbox -->
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="terms" required>
                        <span class="checkbox-text">
                            Я согласен с
                            <a href="#" class="link">Условиями использования</a> и
                            <a href="#" class="link">Политикой конфиденциальности</a> BreadixAI.
                        </span>
                    </label>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="submit-btn">Войти</button>

                <!-- Links -->
                <div class="auth-links">
                    <span></span>
                    <a href="sign_up.html" class="link">Регистрация</a>
                </div>
            </form>

            <!-- Contact Link -->
            <div class="contact-link">
                <a href="#" class="link-secondary">Связаться с нами</a>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
